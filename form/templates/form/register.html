<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | DUCAT {{ active_branch }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --background: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--background);
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .reg-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .reg-header { text-align: center; margin-bottom: 30px; }
        .reg-header i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .reg-header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input, .input-group select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); }

        .messages { margin-bottom: 20px; }
        .alert { padding: 12px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; text-align: center; }
        .alert-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .alert-error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <div class="reg-card">
        <div class="reg-header">
            <i class="fa-solid fa-user-plus"></i>
            <h1>Student Enrollment</h1>
            <p style="color: #64748b; font-size: 0.85rem; margin-top: 5px;">Join DUCAT {{ active_branch }} Learning Hub</p>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>Student ID (SID)</label>
                <input type="text" name="student_id" placeholder="e.g. 123456" required 
                       oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label>Phone Number (10 Digits)</label>
                <input type="text" name="phone" placeholder="9876543210" required 
                       maxlength="10" minlength="10" pattern="\d{10}"
                       oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10)">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="input-group">
                <label>Course Selection</label>
                <select name="course" required>
                    <option value="">Select Course</option>
                    {% for val, label in technology_choices %}
                        <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="input-group">
                <label>Branch Selection</label>
                <select name="branch" required>
                    <option value="">Select Branch</option>
                    <option value="Vikaspuri" {% if active_branch == 'Vikaspuri' %}selected{% endif %}>Vikaspuri</option>
                    <option value="Pitampura" {% if active_branch == 'Pitampura' %}selected{% endif %}>Pitampura</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-paper-plane"></i> Finalize Enrollment
            </button>
        </form>
    </div>
</body>
</html>
