<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ducat Admin - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0c10;
            --accent: #6366f1;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: move 25s infinite alternate;
        }
        .blob-1 { top: -20%; left: -10%; }
        .blob-2 { bottom: -20%; right: -10%; background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%); }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(150px, 150px); }
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 60px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 35px 70px -12px rgba(0,0,0,0.6);
            animation: fadeInScale 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .auth-header { text-align: center; margin-bottom: 45px; }
        .auth-header i { font-size: 3.5rem; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        .auth-header h1 { font-size: 2.2rem; font-weight: 800; color: var(--text-light); letter-spacing: -1px; }
        .auth-header p { color: var(--text-muted); font-size: 1rem; margin-top: 10px; opacity: 0.8; }

        .auth-form { display: grid; gap: 25px; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; transition: 0.3s; pointer-events: none; }

        .auth-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 18px 24px 18px 65px;
            border-radius: 18px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.4s;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }

        .auth-input:focus { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); box-shadow: 0 0 20px rgba(99, 102, 241, 0.1); }
        .auth-input:focus + i { color: var(--accent); }

        .auth-btn {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 15px;
            letter-spacing: 1px;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .auth-btn:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.5); filter: brightness(1.1); }
        .auth-btn:active { transform: translateY(0); }

        .auth-footer { text-align: center; margin-top: 40px; font-size: 0.95rem; color: var(--text-muted); }
        .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 800; border-bottom: 2px solid transparent; transition: 0.3s; }
        .auth-footer a:hover { border-bottom-color: var(--accent); }

        .messages { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 100%; max-width: 400px; display: grid; gap: 12px; }
        .alert { background: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.2); color: #f43f5e; padding: 18px 30px; border-radius: 15px; font-size: 0.9rem; font-weight: 600; text-align: center; backdrop-filter: blur(15px); animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .alert-success { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.2); color: #10b981; }

        @keyframes dropIn { from { opacity:0; transform: translateY(-30px); } to { opacity:1; transform: translateY(0); } }

        /* Floating effect on logo */
        .fa-shield-halved { animation: float 6s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="messages">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-shield-halved"></i>
            <h1>Authorized Login</h1>
            <p>Access the Instructor Rating Control Panel</p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="input-group">
                <i class="fa-solid fa-user-shield"></i>
                <input type="text" name="username" class="auth-input" placeholder="Admin Username" required autocomplete="username">
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" name="password" class="auth-input" placeholder="Security Password" required autocomplete="current-password">
            </div>

            <button type="submit" class="auth-btn">SECURE ACCESS</button>
        </form>

        <div class="auth-footer">
            Unauthorized? <a href="{% url 'signup_view' %}">Establish New Access</a>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.querySelectorAll('.alert').forEach(a => {
                a.style.transition = '0.5s';
                a.style.opacity = '0';
                a.style.transform = 'translateY(-20px)';
                setTimeout(() => a.remove(), 500);
            });
        }, 4000);
    </script>
</body>
</html>
